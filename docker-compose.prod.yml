# mystock.bot 프로덕션 Docker Compose 설정
# 사용법: docker compose -f docker-compose.prod.yml pull && docker compose -f docker-compose.prod.yml up -d

services:
  # PostgreSQL 데이터베이스 (외부 포트 미노출)
  postgres:
    image: postgres:16-alpine
    # 포트 미노출 — 내부 네트워크만 사용
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Redis 캐시 서버 (외부 포트 미노출)
  redis:
    image: redis:7-alpine
    # 포트 미노출 — 내부 네트워크만 사용
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # FastAPI 백엔드 서버 (gunicorn + uvicorn worker)
  backend:
    image: ghcr.io/frogy95/mystock-bot-backend:latest
    # 포트 미노출 — Nginx를 통해서만 접근
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      DEBUG: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Next.js 프론트엔드 서버 (standalone 빌드)
  frontend:
    image: ghcr.io/frogy95/mystock-bot-frontend:latest
    # 포트 미노출 — Nginx를 통해서만 접근
    env_file:
      - .env
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Nginx 리버스 프록시 (80 포트 노출)
  nginx:
    image: ghcr.io/frogy95/mystock-bot-nginx:latest
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

# 영구 볼륨 정의
volumes:
  postgres_data:
